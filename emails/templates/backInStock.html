<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Back In Stock Notification</title>
</head>

<body style="margin:0;padding:0;background:#f6f7fb;font-family:Arial,sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center" style="padding:30px 15px;">

                <table width="600" cellpadding="0" cellspacing="0"
                    style="background:#ffffff;border-radius:12px;overflow:hidden;">

                    <tr>
                        <td style="background:#008060;padding:25px;text-align:center;color:#ffffff;">

                            <h1 style="margin:0;font-size:24px;">
                                Your Product Is Back In Stock 🎉
                            </h1>

                        </td>
                    </tr>


                    <tr>
                        <td style="padding:30px;text-align:center;">

                            <img src="{{productImage}}" alt="{{productName}}"
                                style="width:220px;height:220px;object-fit:cover;border-radius:12px;">


                            <h2 style="color:#111827;margin:20px 0 10px;">
                                {{productName}}
                            </h2>


                            <p style="font-size:20px;font-weight:bold;color:#111827;">
                                {{price}}
                            </p>


                            <p style="color:#6b7280;font-size:15px;line-height:24px;">
                                Good news! The product you were waiting for is available again.
                                Order now before it goes out of stock.
                            </p>


                            <a href="{{productUrl}}"
                                style="display:inline-block;margin-top:20px;background:#008060;color:#ffffff;text-decoration:none;padding:14px 30px;border-radius:8px;font-weight:bold;">
                                Add To Cart
                            </a>


                            <a href="{{buyUrl}}"
                                style="display:inline-block;margin-top:15px;background:#111827;color:#ffffff;text-decoration:none;padding:14px 30px;border-radius:8px;font-weight:bold;">
                                Buy Now
                            </a>


                        </td>
                    </tr>


                    <tr>
                        <td style="background:#f9fafb;padding:20px;text-align:center;color:#6b7280;font-size:13px;">

                            <p style="margin:0;">
                                You received this email because you requested a back-in-stock notification.
                            </p>

                            <p style="margin:8px 0 0;">
                                {{storeName}}
                            </p>

                        </td>
                    </tr>


                </table>

            </td>
        </tr>
    </table>

</body>

</html>
